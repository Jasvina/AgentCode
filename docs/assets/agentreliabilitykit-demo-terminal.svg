<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentReliabilityKit quick demo output</title>
  <desc id="desc">A terminal-style screenshot showing the AgentReliabilityKit automation demo command, generated artifacts, and summary metrics from AgentCI, TracePack, FailMap, and PackSlice.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111C30"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#121C2E"/>
      <stop offset="1" stop-color="#0E1728"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0A7BBB"/>
      <stop offset="1" stop-color="#6B7CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1280" height="900" rx="32" fill="url(#bg)"/>

  <rect x="56" y="48" width="1168" height="804" rx="28" fill="url(#panel)" stroke="#26334A" filter="url(#shadow)"/>
  <rect x="56" y="48" width="1168" height="70" rx="28" fill="#172338"/>
  <circle cx="95" cy="83" r="10" fill="#FF5F57"/>
  <circle cx="127" cy="83" r="10" fill="#FEBC2E"/>
  <circle cx="159" cy="83" r="10" fill="#28C840"/>
  <text x="550" y="90" fill="#DDE7F5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">AgentReliabilityKit quick demo</text>

  <rect x="92" y="146" width="1096" height="82" rx="18" fill="#0A1322" stroke="#23324B"/>
  <text x="118" y="182" fill="#8BB4FF" font-family="Menlo, Consolas, monospace" font-size="21">$</text>
  <text x="144" y="182" fill="#E8EEF8" font-family="Menlo, Consolas, monospace" font-size="21">./scripts/run_automation_demo.sh /tmp/agentreliabilitykit-demo</text>
  <text x="118" y="212" fill="#8FA6BF" font-family="Inter, Arial, sans-serif" font-size="16">Runs the whole monorepo chain and emits CI-friendly artifacts without scraping human logs.</text>

  <text x="92" y="278" fill="#EEF5FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Generated outputs</text>
  <text x="92" y="306" fill="#8FA6BF" font-family="Inter, Arial, sans-serif" font-size="16">These are the same outputs the root GitHub Actions workflow validates and uploads as artifacts.</text>

  <rect x="92" y="334" width="512" height="234" rx="22" fill="#0A1322" stroke="#22324B"/>
  <text x="122" y="376" fill="#9CC7FF" font-family="Menlo, Consolas, monospace" font-size="18">/tmp/agentreliabilitykit-demo</text>
  <text x="122" y="412" fill="#D6E2F2" font-family="Menlo, Consolas, monospace" font-size="17">├── agentci-summary.json</text>
  <text x="122" y="442" fill="#D6E2F2" font-family="Menlo, Consolas, monospace" font-size="17">├── agentci-regression.json</text>
  <text x="122" y="472" fill="#D6E2F2" font-family="Menlo, Consolas, monospace" font-size="17">├── tracepack-pack/manifest.json</text>
  <text x="122" y="502" fill="#D6E2F2" font-family="Menlo, Consolas, monospace" font-size="17">├── failmap-clusters.json</text>
  <text x="122" y="532" fill="#D6E2F2" font-family="Menlo, Consolas, monospace" font-size="17">└── packslice/summary.json</text>

  <rect x="636" y="334" width="552" height="234" rx="22" fill="#0A1322" stroke="#22324B"/>
  <text x="666" y="376" fill="#EEF5FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Automation checks</text>
  <rect x="666" y="398" width="212" height="38" rx="12" fill="#0E2333" stroke="#20415A"/>
  <text x="684" y="422" fill="#7EE787" font-family="Inter, Arial, sans-serif" font-size="17">✓ AgentCI summary parsed</text>
  <rect x="896" y="398" width="250" height="38" rx="12" fill="#0E2333" stroke="#20415A"/>
  <text x="914" y="422" fill="#7EE787" font-family="Inter, Arial, sans-serif" font-size="17">✓ Regression gate passed</text>
  <rect x="666" y="452" width="224" height="38" rx="12" fill="#0E2333" stroke="#20415A"/>
  <text x="684" y="476" fill="#7EE787" font-family="Inter, Arial, sans-serif" font-size="17">✓ TracePack manifest OK</text>
  <rect x="908" y="452" width="196" height="38" rx="12" fill="#0E2333" stroke="#20415A"/>
  <text x="926" y="476" fill="#7EE787" font-family="Inter, Arial, sans-serif" font-size="17">✓ FailMap cluster OK</text>
  <rect x="666" y="506" width="272" height="38" rx="12" fill="#0E2333" stroke="#20415A"/>
  <text x="684" y="530" fill="#7EE787" font-family="Inter, Arial, sans-serif" font-size="17">✓ PackSlice summary has 3 splits</text>

  <text x="92" y="634" fill="#EEF5FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Sample metrics from the demo run</text>

  <rect x="92" y="666" width="250" height="146" rx="22" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="118" y="708" fill="white" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">AgentCI</text>
  <text x="118" y="742" fill="#DCEEFF" font-family="Inter, Arial, sans-serif" font-size="16">episode_id</text>
  <text x="118" y="767" fill="white" font-family="Menlo, Consolas, monospace" font-size="17">openai-agents-demo</text>
  <text x="118" y="792" fill="#DCEEFF" font-family="Inter, Arial, sans-serif" font-size="16">tool_calls: 1   model_calls: 2</text>

  <rect x="366" y="666" width="250" height="146" rx="22" fill="#151F34" stroke="#2A3954"/>
  <text x="392" y="708" fill="#F1EAFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">TracePack</text>
  <text x="392" y="742" fill="#BFA8FF" font-family="Inter, Arial, sans-serif" font-size="16">manifest format</text>
  <text x="392" y="767" fill="#FFFFFF" font-family="Menlo, Consolas, monospace" font-size="17">tracepack-v1</text>
  <text x="392" y="792" fill="#CFC3F9" font-family="Inter, Arial, sans-serif" font-size="16">case_count: 1</text>

  <rect x="640" y="666" width="250" height="146" rx="22" fill="#151F34" stroke="#2A3954"/>
  <text x="666" y="708" fill="#FFF2E6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">FailMap</text>
  <text x="666" y="742" fill="#FFCAA1" font-family="Inter, Arial, sans-serif" font-size="16">cluster snapshot</text>
  <text x="666" y="767" fill="#FFFFFF" font-family="Menlo, Consolas, monospace" font-size="17">failmap-v1</text>
  <text x="666" y="792" fill="#F7D7BC" font-family="Inter, Arial, sans-serif" font-size="16">cluster_count: 1</text>

  <rect x="914" y="666" width="274" height="146" rx="22" fill="#151F34" stroke="#2A3954"/>
  <text x="940" y="708" fill="#E7FFF1" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">PackSlice</text>
  <text x="940" y="742" fill="#A8E5C3" font-family="Inter, Arial, sans-serif" font-size="16">summary</text>
  <text x="940" y="767" fill="#FFFFFF" font-family="Menlo, Consolas, monospace" font-size="17">splits: train / eval / test</text>
  <text x="940" y="792" fill="#CBECD9" font-family="Inter, Arial, sans-serif" font-size="16">total_cases: 1</text>
</svg>
