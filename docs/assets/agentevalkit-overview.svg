<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentEvalKit architecture overview</title>
  <desc id="desc">A pipeline diagram showing AgentCI, TracePack, FailMap, and PackSlice connected by portable JSON artifacts and CI automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0A7BBB"/>
      <stop offset="1" stop-color="#6B7CFF"/>
    </linearGradient>
    <linearGradient id="agentci" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDF7FF"/>
      <stop offset="1" stop-color="#DCEFFF"/>
    </linearGradient>
    <linearGradient id="tracepack" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3EEFF"/>
      <stop offset="1" stop-color="#E8DDFF"/>
    </linearGradient>
    <linearGradient id="failmap" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF1E6"/>
      <stop offset="1" stop-color="#FFE1C7"/>
    </linearGradient>
    <linearGradient id="packslice" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFFF6"/>
      <stop offset="1" stop-color="#D7F8E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#132238" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" stroke="#57738F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="760" rx="32" fill="url(#bg)"/>

  <rect x="48" y="40" width="1184" height="108" rx="24" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="88" y="88" fill="white" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">AgentEvalKit</text>
  <text x="88" y="124" fill="#DCEEFF" font-family="Inter, Arial, sans-serif" font-size="18">
    Reproducibility, regression testing, failure clustering, and eval-pack preparation for tool-using LLM agents
  </text>
  <rect x="950" y="66" width="222" height="56" rx="16" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.25)"/>
  <text x="982" y="100" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Portable JSON artifacts</text>

  <text x="70" y="188" fill="#24384D" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Pipeline at a glance</text>
  <text x="70" y="216" fill="#5D7288" font-family="Inter, Arial, sans-serif" font-size="16">
    One monorepo, four focused tools, one CI-friendly artifact chain
  </text>

  <rect x="70" y="254" width="255" height="220" rx="26" fill="url(#agentci)" stroke="#B9DFFF" filter="url(#shadow)"/>
  <text x="98" y="300" fill="#164566" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">1. AgentCI</text>
  <text x="98" y="334" fill="#2B516F" font-family="Inter, Arial, sans-serif" font-size="17">Record, replay, diff, and gate</text>
  <text x="98" y="359" fill="#2B516F" font-family="Inter, Arial, sans-serif" font-size="17">agent behavior before shipping</text>
  <rect x="98" y="388" width="192" height="34" rx="10" fill="#FFFFFF" stroke="#C7E4FF"/>
  <text x="113" y="410" fill="#35637F" font-family="Menlo, Consolas, monospace" font-size="14">episode.json</text>
  <text x="98" y="446" fill="#4D667D" font-family="Inter, Arial, sans-serif" font-size="15">• regression checks</text>
  <text x="98" y="470" fill="#4D667D" font-family="Inter, Arial, sans-serif" font-size="15">• HTML + JSON diffs</text>

  <rect x="365" y="254" width="255" height="220" rx="26" fill="url(#tracepack)" stroke="#D7C6FF" filter="url(#shadow)"/>
  <text x="393" y="300" fill="#4B2D88" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">2. TracePack</text>
  <text x="393" y="334" fill="#5D428F" font-family="Inter, Arial, sans-serif" font-size="17">Turn episodes into reusable</text>
  <text x="393" y="359" fill="#5D428F" font-family="Inter, Arial, sans-serif" font-size="17">benchmark packs with redaction</text>
  <rect x="393" y="388" width="192" height="34" rx="10" fill="#FFFFFF" stroke="#DDCCFF"/>
  <text x="408" y="410" fill="#684AA2" font-family="Menlo, Consolas, monospace" font-size="14">manifest.json + cases/</text>
  <text x="393" y="446" fill="#6D5A8A" font-family="Inter, Arial, sans-serif" font-size="15">• signature-aware sampling</text>
  <text x="393" y="470" fill="#6D5A8A" font-family="Inter, Arial, sans-serif" font-size="15">• jsonl/chat export</text>

  <rect x="660" y="254" width="255" height="220" rx="26" fill="url(#failmap)" stroke="#FFD1AD" filter="url(#shadow)"/>
  <text x="688" y="300" fill="#914C16" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">3. FailMap</text>
  <text x="688" y="334" fill="#925C2F" font-family="Inter, Arial, sans-serif" font-size="17">Cluster recurring failures and</text>
  <text x="688" y="359" fill="#925C2F" font-family="Inter, Arial, sans-serif" font-size="17">compare releases for triage</text>
  <rect x="688" y="388" width="192" height="34" rx="10" fill="#FFFFFF" stroke="#FFD8BB"/>
  <text x="703" y="410" fill="#9A6335" font-family="Menlo, Consolas, monospace" font-size="14">clusters.json / compare.json</text>
  <text x="688" y="446" fill="#8D6A4B" font-family="Inter, Arial, sans-serif" font-size="15">• issue-ready markdown</text>
  <text x="688" y="470" fill="#8D6A4B" font-family="Inter, Arial, sans-serif" font-size="15">• trends, bundles, owners</text>

  <rect x="955" y="254" width="255" height="220" rx="26" fill="url(#packslice)" stroke="#BFEFD8" filter="url(#shadow)"/>
  <text x="983" y="300" fill="#166443" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">4. PackSlice</text>
  <text x="983" y="334" fill="#2B6A52" font-family="Inter, Arial, sans-serif" font-size="17">Split the same pack into</text>
  <text x="983" y="359" fill="#2B6A52" font-family="Inter, Arial, sans-serif" font-size="17">balanced train / eval / test</text>
  <rect x="983" y="388" width="192" height="34" rx="10" fill="#FFFFFF" stroke="#CDEEDF"/>
  <text x="998" y="410" fill="#2D7757" font-family="Menlo, Consolas, monospace" font-size="14">summary.json + split dirs</text>
  <text x="983" y="446" fill="#517965" font-family="Inter, Arial, sans-serif" font-size="15">• distribution-aware slicing</text>
  <text x="983" y="470" fill="#517965" font-family="Inter, Arial, sans-serif" font-size="15">• chronological modes</text>

  <line x1="325" y1="364" x2="365" y2="364" stroke="#57738F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="620" y1="364" x2="660" y2="364" stroke="#57738F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="915" y1="364" x2="955" y2="364" stroke="#57738F" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="70" y="536" width="1140" height="160" rx="26" fill="#FFFFFF" stroke="#D8E2EC" filter="url(#shadow)"/>
  <text x="100" y="580" fill="#24384D" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">What CI and automation produce</text>
  <text x="100" y="612" fill="#5D7288" font-family="Inter, Arial, sans-serif" font-size="16">
    The monorepo demo workflow validates the full chain and uploads artifacts teams can inspect, diff, and reuse.
  </text>

  <rect x="100" y="636" width="230" height="34" rx="10" fill="#F4F8FC" stroke="#DCE6F0"/>
  <text x="116" y="658" fill="#40586F" font-family="Menlo, Consolas, monospace" font-size="14">agentci-summary.json</text>
  <rect x="346" y="636" width="250" height="34" rx="10" fill="#F4F8FC" stroke="#DCE6F0"/>
  <text x="362" y="658" fill="#40586F" font-family="Menlo, Consolas, monospace" font-size="14">tracepack-pack/manifest.json</text>
  <rect x="612" y="636" width="214" height="34" rx="10" fill="#F4F8FC" stroke="#DCE6F0"/>
  <text x="628" y="658" fill="#40586F" font-family="Menlo, Consolas, monospace" font-size="14">failmap-clusters.json</text>
  <rect x="842" y="636" width="318" height="34" rx="10" fill="#F4F8FC" stroke="#DCE6F0"/>
  <text x="858" y="658" fill="#40586F" font-family="Menlo, Consolas, monospace" font-size="14">packslice/summary.json + splits/</text>
  <text x="100" y="688" fill="#5D7288" font-family="Inter, Arial, sans-serif" font-size="14">
    Docs: README.md · docs/automation.md · scripts/run_automation_demo.sh · .github/workflows/ci.yml
  </text>
</svg>
