<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentReliabilityKit social preview</title>
  <desc id="desc">A GitHub social preview card for AgentReliabilityKit showing an eval loop, starter status chips, and the four-tool artifact workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#16233A"/>
    </linearGradient>
    <linearGradient id="halo" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0A7BBB"/>
      <stop offset="1" stop-color="#4FE0B6"/>
    </linearGradient>
    <linearGradient id="chippass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0E7A4A"/>
      <stop offset="1" stop-color="#1EA86A"/>
    </linearGradient>
    <linearGradient id="chipflake" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8A6700"/>
      <stop offset="1" stop-color="#C18D14"/>
    </linearGradient>
    <linearGradient id="chipregress" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A53A2A"/>
      <stop offset="1" stop-color="#D85A43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="856" cy="306" r="170" fill="url(#halo)" opacity="0.16"/>

  <g opacity="0.10" stroke="#A9B8CC">
    <path d="M0 112H1280"/>
    <path d="M0 208H1280"/>
    <path d="M0 304H1280"/>
    <path d="M0 400H1280"/>
    <path d="M0 496H1280"/>
    <path d="M140 0V640"/>
    <path d="M332 0V640"/>
    <path d="M524 0V640"/>
    <path d="M716 0V640"/>
    <path d="M908 0V640"/>
    <path d="M1100 0V640"/>
  </g>

  <text x="84" y="142" fill="#F4F8FF" font-family="Avenir Next Condensed, Inter, Arial, sans-serif" font-size="64" font-weight="700">Trust the Eval Loop</text>
  <text x="84" y="188" fill="#AFC2D8" font-family="Menlo, Consolas, monospace" font-size="24">Replay, package, cluster, and slice agent traces with CI-friendly artifacts.</text>

  <rect x="84" y="238" width="178" height="46" rx="14" fill="url(#chippass)" filter="url(#shadow)"/>
  <text x="116" y="268" fill="#ECFFF5" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">PASS</text>
  <rect x="278" y="238" width="178" height="46" rx="14" fill="url(#chipflake)" filter="url(#shadow)"/>
  <text x="310" y="268" fill="#FFF8E7" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">FLAKE</text>
  <rect x="472" y="238" width="196" height="46" rx="14" fill="url(#chipregress)" filter="url(#shadow)"/>
  <text x="504" y="268" fill="#FFF1EE" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">REGRESS</text>

  <rect x="84" y="326" width="500" height="200" rx="28" fill="#111A2B" stroke="#293B58" filter="url(#shadow)"/>
  <text x="118" y="372" fill="#F2F7FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Artifact workflow</text>
  <text x="118" y="412" fill="#AFC2D8" font-family="Menlo, Consolas, monospace" font-size="20">AgentCI   -&gt; episode.json</text>
  <text x="118" y="446" fill="#AFC2D8" font-family="Menlo, Consolas, monospace" font-size="20">TracePack -&gt; manifest.json + cases/</text>
  <text x="118" y="480" fill="#AFC2D8" font-family="Menlo, Consolas, monospace" font-size="20">FailMap   -&gt; clusters.json</text>
  <text x="118" y="514" fill="#AFC2D8" font-family="Menlo, Consolas, monospace" font-size="20">PackSlice -&gt; summary.json + splits/</text>

  <g filter="url(#shadow)">
    <circle cx="930" cy="312" r="92" fill="#101A2A" stroke="#355174" stroke-width="3"/>
    <circle cx="930" cy="206" r="26" fill="#18273D" stroke="#4FE0B6" stroke-width="3"/>
    <circle cx="1024" cy="360" r="26" fill="#18273D" stroke="#7AA8FF" stroke-width="3"/>
    <circle cx="836" cy="360" r="26" fill="#18273D" stroke="#FF8E73" stroke-width="3"/>
    <path d="M930 232L1010 344" stroke="#567AA5" stroke-width="4" stroke-linecap="round"/>
    <path d="M1000 360H862" stroke="#567AA5" stroke-width="4" stroke-linecap="round"/>
    <path d="M848 344L916 232" stroke="#567AA5" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="895" y="212" fill="#EAFBF4" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">input</text>
  <text x="990" y="366" fill="#EEF4FF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">grader</text>
  <text x="794" y="366" fill="#FFF1EE" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">result</text>

  <rect x="1044" y="172" width="152" height="70" rx="18" fill="#101A2A" stroke="#314661" filter="url(#shadow)"/>
  <text x="1070" y="205" fill="#E9F5FF" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">84% pass rate</text>
  <text x="1070" y="228" fill="#9EB7D1" font-family="Menlo, Consolas, monospace" font-size="14">6 graders</text>

  <path d="M1036 478C1062 448 1081 448 1102 456C1122 464 1140 522 1160 504C1180 486 1198 420 1220 438" stroke="#8CB3FF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="1160" cy="504" r="7" fill="#FF7E63"/>

  <rect x="792" y="484" width="106" height="46" rx="14" fill="#101A2A" stroke="#355174"/>
  <text x="816" y="513" fill="#DDEAFF" font-family="Menlo, Consolas, monospace" font-size="15">suite.yaml</text>
  <rect x="820" y="516" width="106" height="46" rx="14" fill="#122036" stroke="#355174"/>
  <text x="846" y="545" fill="#DDEAFF" font-family="Menlo, Consolas, monospace" font-size="15">agent.py</text>
  <rect x="848" y="548" width="106" height="46" rx="14" fill="#14243D" stroke="#355174"/>
  <text x="870" y="577" fill="#DDEAFF" font-family="Menlo, Consolas, monospace" font-size="15">report.db</text>
</svg>
